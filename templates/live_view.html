<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Live Camera - Device {{ device.id }}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
        margin: 0;
        padding: 20px;
      }

      h1 {
        margin-bottom: 10px;
      }

      .meta {
        margin-bottom: 20px;
        color: #bbb;
      }

      img {
        width: 90%;
        max-width: 900px;
        border: 3px solid #444;
        border-radius: 12px;
        background: #222;
      }

      #statusBox {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.8;
      }

      .label {
        color: #bbb;
        margin-right: 8px;
      }
    </style>
  </head>

  <body>
    <h1>Live Camera - Device {{ device.id }}</h1>

    <div class="meta">
      Device: {{ device.name }} | Last frame: {{
      device.latest_frame_at|default:"Chưa có ảnh" }}
    </div>

    <img id="camera" src="/devices/{{ device.id }}/frame/" alt="Live camera" />

    <div id="statusBox">
      <div><span class="label">Eye:</span><span id="eyeStatus">...</span></div>
      <div>
        <span class="label">Eye streak:</span><span id="eyeStreak">0</span>
      </div>

      <div>
        <span class="label">Head:</span><span id="headStatus">...</span>
      </div>
      <div>
        <span class="label">Head dir:</span
        ><span id="headDirection">FORWARD</span>
      </div>
      <div>
        <span class="label">Head score:</span><span id="headScore">0</span>
      </div>
      <div><span class="label">Yaw:</span><span id="headYaw">0</span></div>
    </div>

    <script>
      const img = document.getElementById("camera");

      const eyeStatusText = document.getElementById("eyeStatus");
      const eyeStreakText = document.getElementById("eyeStreak");

      const headStatusText = document.getElementById("headStatus");
      const headDirectionText = document.getElementById("headDirection");
      const headScoreText = document.getElementById("headScore");
      const headYawText = document.getElementById("headYaw");

      const intervalMs = 500;
      const eyeClosedFrames = 6; // đổi theo settings của bạn nếu cần

      // load frame
      setInterval(() => {
        img.src = "/devices/{{ device.id }}/frame/?t=" + new Date().getTime();
      }, intervalMs);

      function updateStatus() {
        fetch("/devices/{{ device.id }}/live/", {
          headers: { "X-Requested-With": "XMLHttpRequest" },
        })
          .then((res) => res.json())
          .then((data) => {
            // ===== EYE =====
            const eyeStreak = data.eye_closed_streak || 0;
            eyeStreakText.innerText = eyeStreak;

            if (eyeStreak >= eyeClosedFrames) {
              eyeStatusText.innerText = "NGỦ GỤC";
              eyeStatusText.style.color = "red";
            } else if (eyeStreak > 0) {
              eyeStatusText.innerText = "ĐANG NHẮM MẮT";
              eyeStatusText.style.color = "orange";
            } else {
              eyeStatusText.innerText = "TỈNH TÁO";
              eyeStatusText.style.color = "lime";
            }

            // ===== HEAD =====
            const headStatus = data.head_status || "SAFE";
            const headDirection = data.head_direction || "FORWARD";
            const headScore = data.head_turn_score || 0;
            const headYaw = data.head_yaw ?? 0;

            headDirectionText.innerText = headDirection;
            headScoreText.innerText = headScore;
            headYawText.innerText = Number(headYaw).toFixed(1);

            if (headStatus === "VIOLATION") {
              headStatusText.innerText = "VI PHẠM";
              headStatusText.style.color = "red";
            } else if (headStatus === "TURNING") {
              headStatusText.innerText = "ĐANG QUAY ĐẦU";
              headStatusText.style.color = "orange";
            } else {
              headStatusText.innerText = "AN TOÀN";
              headStatusText.style.color = "lime";
            }
          })
          .catch(() => {
            eyeStatusText.innerText = "ERROR";
            eyeStatusText.style.color = "gray";

            headStatusText.innerText = "ERROR";
            headStatusText.style.color = "gray";
          });
      }

      setInterval(updateStatus, intervalMs);
      updateStatus();
    </script>
  </body>
</html>
